template: "Hi {{salutation}},\r\n\r\nWe've finished preparing the {{accounts_year}} annual accounts for {{client_name}} and have attached the below for you to review when you have a moment:\r\n\r\nFinancial Statements\r\nStatutory minutes\r\nIR6 Trust tax return \r\nIR3 individual tax return and IR526 donation rebate return for {{beneficiary_name_1}}\r\nIR3 individual tax return and IR526 donation rebate return for {{beneficiary_name_1}}\r\nFor the 12 months ending March {{accounts_year}}, revenue was {{simple_table_amount_1}}X,{{beneficiary_name_1}} – this is an overall increase/decrease of {{revenue_change_percentage}} from the year ending {{prior_year_end_date}}. This was largely due to {{revenue_change_explanation}}\r\n\r\nDirect costs have naturally increased/decreased alongside sales, and the gross profit margin has increased/decreased/remained consistent from the 2024 year at {{revenue_change_percentage}} to last year at {{revenue_change_percentage}}. This was largely due to {{gross_profit_change_explanation}} \r\n\r\nOverheads have seen a reasonable increase/decrease of {{simple_table_amount_1}}{{beneficiary_name_1}}.XX or {{revenue_change_percentage}}. Key movements for the year were:\r\n\r\nOR \r\n\r\nOverheads for the year totalled {{simple_table_amount_1}}{{beneficiary_name_1}}. A majority of the overhead expenses were made up of: [if no comparatives]\r\n\r\n[Check internal queries for any points to add to the final email]\r\n\r\nTrust tax return\r\n\r\nFrom a tax perspective, there is taxable income in the Trust of {{simple_table_amount_1}}X,{{beneficiary_name_1}}. Tax on this amount is {{simple_table_amount_1}}X,{{beneficiary_name_1}}. After accounting for tax credits on investment income and provisional tax paid during the year, the Trust is due to receive a refund of {{simple_table_amount_1}}{{beneficiary_name_1}}/has tax to pay of {{simple_table_amount_1}}{{beneficiary_name_1}}. This is due for payment on {{trust_tax_due_date}} and we will be in touch closer to the due date with our standard reminder letter. \r\n\r\nAll profits in the Trust have been distributed to you by way of a shareholder salary, this means there are no upcoming income tax obligations in the Trust. \r\n\r\nOR\r\n\r\nThe most recent tax return resets the  Trust’s provisional tax payments for the current financial year which are summarised in the table below.\r\n\r\nOR\r\n\r\nThe most recent tax return triggers the Trust to become a provisional taxpayer which means income tax payments are required to be made throughout the year, rather than in one lump sum at the end. These payments are summarised in the table below.\r\n\r\nIndividual tax return\r\n\r\n{{salutation}}, your total taxable income for the year was {{simple_table_amount_1}}X,{{beneficiary_name_1}} which is made up of your shareholder salary from {{client_name}}, PAYE salary from {{beneficiary_name_1}}, interest earnings and dividend income. Tax on this amount is {{simple_table_amount_1}}X,{{beneficiary_name_1}}. With PAYE already deducted, tax credits on your investment income and provisional tax already paid during the year, you are due to receive a refund of {{simple_table_amount_1}}{{beneficiary_name_1}}/have tax to pay of {{simple_table_amount_1}}{{beneficiary_name_1}}. This is due for payment on {{trust_tax_due_date}}.\r\n\r\nAs in the Trust, the most recent tax return resets your provisional tax payments for the current financial year which are summarised below.\r\n\r\nOR\r\n\r\nThe most recent tax return triggers you to become a provisional taxpayer which means you are required to make income tax payments throughout the year, rather than in one lump sum at the end. These payments are summarised in the table below. \r\n\r\nTax payer\r\n\r\n28 August {{accounts_year}} (provisional tax  \r\nfor the current  \r\nfinancial year)\r\n\r\n{{provisional_tax_date_2}} (provisional tax  \r\nfor the current  \r\nfinancial year)\r\n\r\n{{trust_tax_due_date}}  \r\n(final tax for last financial year)\r\n\r\n{{provisional_tax_date_4}}  \r\n(provisional tax for the current financial year)\r\n\r\n{{client_name}}\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{salutation}}\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n\r\n \r\n\r\n \r\n\r\n \r\n\r\n \r\n\r\nTotal\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n{{simple_table_amount_1}}X,{{beneficiary_name_1}}.XX\r\n\r\n\r\nOR [a simpler table for only one tax payer]\r\n\r\nPayment date\r\n\r\nAmount\r\n\r\nTax type\r\n\r\n28 August {{accounts_year}}\r\n\r\n{{simple_table_amount_1}}\r\n\r\nProvisional tax for the current financial year\r\n\r\n{{provisional_tax_date_2}}\r\n\r\n{{simple_table_amount_1}}\r\n\r\nProvisional tax for the current financial year\r\n\r\n{{trust_tax_due_date}}\r\n\r\n{{simple_table_amount_1}}\r\n\r\nFinal tax for last financial year\r\n\r\n{{provisional_tax_date_4}}\r\n\r\n{{simple_table_amount_1}}\r\n\r\nProvisional tax for the current financial year\r\n\r\nAs normal, we will always send out payment reminder letters prior to the due dates, however it’s worth putting them in your calendar so they’re on your radar!"
